<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculos CodeRider</title>
</head>
<body>
    <div class="container">
        <h1>Cálculos CodeRider</h1>

        <div class="input-group">
            <label for="numero1">Número 1:</label>
            <input type="number" id="numero1" value="10">
        </div>
        <div class="input-group">
            <label for="numero2">Número 2:</label>
            <input type="number" id="numero2" value="5">
        </div>
        
      
        
        </div>
        <div class="input-group">
            <label for="operacion">Operación:</label>
            <select id="operacion">
                
                <option value="ejercicio20">Ejercicio 1/option>
                <option value="ejercicio21">Ejercicio 2</option>
                <option value="ejercicio22">Ejercicio 3</option>
                <option value="ejercicio23">Ejercicio 4</option>
                <option value="ejercicio24">Ejercicio 5</option>
                
                
            </select>
        </div>

        <button id="btncalcular">Calcular 🚀</button>
        <div class="result" id="resultados">El resultado aparecerá aquí...</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
